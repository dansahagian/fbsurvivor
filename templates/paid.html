{% extends "base.html" %}
    {% block content %}
        <a href="/{{ link }}/{{ year }}">Back</a>
        <br><br>
        {% for status in statuses %}
            {% if status[1] %}
                {{ status[0] }}
            {% else %}
                <a href="/{{ link }}/{{ year }}/paid/{{ status[0] }}">{{ status[0] }}</a>
            {% endif %}
            <br><br>
        {% endfor %}
    {% endblock %}
